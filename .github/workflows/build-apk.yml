name: Build APK por Integradora

on:
  push:
    tags:
      # Padrão: integradora-vX.Y.Z
      # Exemplos: rede-v1.2.3, stone-v1.0.1, getnet-v0.2.1
      - '*-v*'

permissions:
  contents: write
  actions: read

jobs:
  extract-tag-info:
    runs-on: ubuntu-latest
    outputs:
      integradora: ${{ steps.extract.outputs.integradora }}
      modelo: ${{ steps.extract.outputs.modelo }}
      versao: ${{ steps.extract.outputs.versao }}
      tag_completa: ${{ steps.extract.outputs.tag_completa }}
      apk_name: ${{ steps.extract.outputs.apk_name }}
    steps:
      - name: Extrair integradora, modelo e versão da tag
        id: extract
        run: |
          TAG=${{ github.ref_name }}
          echo "tag_completa=$TAG" >> $GITHUB_OUTPUT

          # Extrai integradora (primeira parte antes de - ou -v)
          INTEGRADORA=$(echo "$TAG" | sed -E 's/^([a-zA-Z]+)(-[a-zA-Z0-9]+)?-v.*/\1/' | tr '[:lower:]' '[:upper:]')
          echo "integradora=$INTEGRADORA" >> $GITHUB_OUTPUT

          # Extrai modelo (parte entre integradora e -v, se existir)
          # Se houver integradora-modelo-v*, extrai modelo
          # Se houver integradora-v*, modelo fica vazio
          if echo "$TAG" | grep -qE "^[a-zA-Z]+-[a-zA-Z0-9]+-v"; then
            MODELO=$(echo "$TAG" | sed -E 's/^[a-zA-Z]+-([a-zA-Z0-9]+)-v.*/\1/' | tr '[:lower:]' '[:upper:]')
          else
            MODELO=""
          fi
          echo "modelo=$MODELO" >> $GITHUB_OUTPUT

          # Extrai versão (parte depois do -v)
          VERSAO=$(echo "$TAG" | sed -E 's/^[a-zA-Z]+(-[a-zA-Z0-9]+)?-v//')
          echo "versao=$VERSAO" >> $GITHUB_OUTPUT

          # Nome do APK (inclui modelo se existir)
          if [ -z "$MODELO" ]; then
            APK_NAME="app-$INTEGRADORA-$VERSAO.apk"
          else
            APK_NAME="app-$INTEGRADORA-$MODELO-$VERSAO.apk"
          fi
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

          echo "Tag: $TAG"
          echo "Integradora: $INTEGRADORA"
          echo "Modelo: ${MODELO:-vazio}"
          echo "Versão: $VERSAO"
          echo "APK: $APK_NAME"

  build:
    needs: extract-tag-info
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools-version: '34.0.0'

      - name: Criar arquivo .env
        run: |
          echo "ADMINISTRATOR=${{ needs.extract-tag-info.outputs.integradora }}" > .env
          echo "APP_VERSION=${{ needs.extract-tag-info.outputs.versao }}" >> .env
          echo "MODEL=${{ needs.extract-tag-info.outputs.modelo }}" >> .env
          cat .env

      - name: Instalar dependências
        run: npm install

      - name: Atualizar versão no package.json
        run: |
          node -e "
          const pkg = require('./package.json');
          pkg.version = '${{ needs.extract-tag-info.outputs.versao }}';
          require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Atualizar versão no build.gradle
        run: |
          sed -i "s/versionName \".*\"/versionName \"${{ needs.extract-tag-info.outputs.versao }}\"/g" android/app/build.gradle
          cat android/app/build.gradle | grep -i versionName

      - name: Build APK (Release)
        run: |
          cd android
          ./gradlew clean bundleRelease assembleRelease \
            -PAPP_DISPLAY_NAME="MultiTagsPoc - ${{ needs.extract-tag-info.outputs.integradora }}" \
            -PADMINISTRATOR="${{ needs.extract-tag-info.outputs.integradora }}"

      - name: Renomear APK
        run: |
          ORIGINAL_APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          NEW_APK_PATH="android/app/build/outputs/apk/release/${{ needs.extract-tag-info.outputs.apk_name }}"
          mv "$ORIGINAL_APK" "$NEW_APK_PATH"
          echo "APK gerado: $NEW_APK_PATH"
          ls -lh "$NEW_APK_PATH"

      - name: Verificar APK existe
        run: |
          APK_PATH="android/app/build/outputs/apk/release/${{ needs.extract-tag-info.outputs.apk_name }}"
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ ERRO: APK não encontrado em $APK_PATH"
            ls -la android/app/build/outputs/apk/release/
            exit 1
          fi
          echo "✅ APK encontrado e pronto para upload"
          file "$APK_PATH"

      - name: Upload APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: android/app/build/outputs/apk/release/${{ needs.extract-tag-info.outputs.apk_name }}
          retention-days: 30

      - name: Criar Release no GitHub
        id: release
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/${{ needs.extract-tag-info.outputs.apk_name }}
          body: |
            ## 📱 APK - ${{ needs.extract-tag-info.outputs.integradora }}

            **Informações:**
            - **Integradora**: ${{ needs.extract-tag-info.outputs.integradora }}
            - **Versão**: ${{ needs.extract-tag-info.outputs.versao }}
            - **Tag**: `${{ needs.extract-tag-info.outputs.tag_completa }}`
            - **Data**: ${{ github.event.head_commit.timestamp }}

            ```
            APK: app-${{ needs.extract-tag-info.outputs.integradora }}-${{ needs.extract-tag-info.outputs.versao }}.apk
            ```
          draft: false
          prerelease: false
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Atualizar Latest por Integradora
        run: |
          INTEGRADORA="${{ needs.extract-tag-info.outputs.integradora }}"

          # Listar todas as releases da integradora (ordenadas por versão)
          RELEASES=$(gh release list --limit 100 --json name,isLatest | jq -r ".[] | select(.name | startswith(\"$INTEGRADORA\")) | .name" | sort -V)

          if [ -z "$RELEASES" ]; then
            echo "Nenhuma release encontrada para $INTEGRADORA"
            exit 0
          fi

          # A última é a mais recente
          LATEST_RELEASE=$(echo "$RELEASES" | tail -1)

          echo "Releases de $INTEGRADORA encontradas:"
          echo "$RELEASES"
          echo ""
          echo "Marcando $LATEST_RELEASE como Latest..."

          # Desmarcar todas como latest
          while IFS= read -r release; do
            if [ -n "$release" ]; then
              gh release update "$release" --latest=false 2>/dev/null || true
            fi
          done <<< "$RELEASES"

          # Marcar apenas a mais recente como latest
          gh release update "$LATEST_RELEASE" --latest=true

          echo "✅ $LATEST_RELEASE agora é a Latest de $INTEGRADORA"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resumo do Build
        run: |
          echo "✅ Build concluído com sucesso!"
          echo ""
          echo "ℹ️ Informações do Build:"
          echo "  📱 Integradora: ${{ needs.extract-tag-info.outputs.integradora }}"
          echo "  🖥️  Modelo: ${{ needs.extract-tag-info.outputs.modelo }}"
          echo "  📦 APK: ${{ needs.extract-tag-info.outputs.apk_name }}"
          echo "  🔖 Versão: ${{ needs.extract-tag-info.outputs.versao }}"
          echo "  🏷️  Tag: ${{ needs.extract-tag-info.outputs.tag_completa }}"
          echo ""
          echo "📥 Download:"
          echo "  GitHub → Releases → ${{ needs.extract-tag-info.outputs.tag_completa }}"
          echo ""
          echo "🔗 Link direto:"
          echo "  https://github.com/${{ github.repository }}/releases/tag/${{ needs.extract-tag-info.outputs.tag_completa }}"
